# yaml有层次,可以继承的配置文件格式
# key:
# 缩进key:  -> key.key
server:
  port: 8088
  servlet:
    context-path: /book

# 自定义配置（yaml格式）
xiaoming:
  user:
    gfs:
      - a
      - b
      - c
    username: root
    password: 123456

# 激活外部配置
spring:
  profiles:
    active: druid
  web:
    resources:
    # 配置静态资源地址,如果设置,会覆盖默认值
      static-locations: classpath:/webapp
  # 禁用数据库初始化脚本，避免自动配置H2驱动
  sql:
    init:
      mode: never